<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 Not Found | Reincal</title>

  <link rel="icon" href="https://dc.missuo.ru/file/1492188322108407973">

  <!-- FONT SAMA KAYAK INDEX -->
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/404.css">
</head>

<body>

  <header class="container">
    <h1 class="text__header">404 — Page Not Found</h1>
  </header>

  <main class="container">
    <section class="hero">
      <img class="hero-image" src="https://dc.missuo.ru/file/1492182344508112907" alt="Astronaut"/>

      <div class="hero-info">
        <h2 class="text__title">Lost in Space?</h2>
        <p class="text__description">
          The page you're looking for doesn't exist or was moved.
        </p>
         
        <p style="font-size:0.9rem;color:var(--muted);">
  Redirecting to home in <span id="count">5</span> seconds...
</p>

        <a href="/" class="button">
          <i class="fas fa-arrow-left"></i>
          Back to Home
        </a>
      </div>
    </section>
  </main>

  <footer class="container footer">
    <hr />
    <p><strong><a href="https://github.com/calrexon">Made by Reincal</a></strong></p>
  </footer>

  <script>
    let countdown = 5;
  const btn = document.querySelector('.button');

  const interval = setInterval(() => {
    countdown--;
    btn.innerHTML = `<i class="fas fa-arrow-left"></i> Back to Home (${countdown})`;

    if (countdown <= 0) {
      clearInterval(interval);
      window.location.href = "/";
    }
  }, 1000);

    const astronaut = document.querySelector('.hero-image');

    astronaut.addEventListener('click', () => {
      for (let i = 0; i < 40; i++) {
        const c = document.createElement('div');
        c.style.position = 'fixed';
        c.style.width = '8px';
        c.style.height = '8px';
        c.style.background = `hsl(${Math.random()*360},100%,50%)`;
        c.style.borderRadius = '50%';
        c.style.left = Math.random()*100 + 'vw';
        c.style.top = '-10px';
        document.body.appendChild(c);

        c.animate([
          { transform: 'translateY(0)', opacity: 1 },
          { transform: `translateY(${window.innerHeight}px)`, opacity: 0 }
        ], {
          duration: 2000 + Math.random()*2000
        }).onfinish = () => c.remove();
      }
    });
  </script>

</body>
</html>
