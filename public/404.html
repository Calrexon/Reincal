<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
  <title>404 Not Found | Reincal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/404.css">
  <header class="container">
    <h1 class="text text__header">404 - Page Not Found</h1>
  </header>

  <main class="container">
    <section class="hero">
      <img class="hero-image" src="image/404.png" alt="Astronaut floating in space"/>
      <div class="hero-info">
        <h2 class="text text__title">Lost in Space?</h2>
        <p class="text text__description">The page you're looking for doesn't exist or was moved. Don't worry, we'll help you get back home safely.</p>
        <a href="https://reincal.is-a.dev" class="button">
          <i class="fas fa-arrow-left"></i>
          Return Home
        </a>
      </div>
    </section>
  </main>

  <footer class="container footer">
    <hr />
    <p><strong><a href="https://github.com/calrexon">Made by Reincal</a></strong></p>
  </footer>

  <script>
    // Add a fun easter egg - confetti when clicking the astronaut
    const astronaut = document.querySelector('.hero-image');
    
    astronaut.addEventListener('click', function() {
      // Create confetti elements
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.style.position = 'fixed';
        confetti.style.width = '10px';
        confetti.style.height = '10px';
        confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
        confetti.style.borderRadius = '50%';
        confetti.style.left = `${Math.random() * 100}vw`;
        confetti.style.top = '-10px';
        confetti.style.zIndex = '1000';
        confetti.style.pointerEvents = 'none';
        document.body.appendChild(confetti);
        
        // Animate confetti
        const animation = confetti.animate([
          { top: '-10px', opacity: 1 },
          { top: `${Math.random() * 100 + 50}vh`, opacity: 0 }
        ], {
          duration: Math.random() * 3000 + 2000,
          easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
        });
        
        // Remove confetti after animation
        animation.onfinish = () => confetti.remove();
      }
    });
  </script>
</body>
</html>
