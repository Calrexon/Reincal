<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 Not Found | Reincal</title>

  <link rel="icon" href="https://dc.missuo.ru/file/1493518251488051320">

  <!-- FONT SAMA KAYAK INDEX -->
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/404.css">
</head>

<body>
  <div class="error-ornament error-ornament-1"></div>
  <div class="error-ornament error-ornament-2"></div>

  <header class="container">
    <h1 class="text__header">404 — Page Not Found</h1>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-info">
        <p class="error-code">404</p>
        <h2 class="text__title">Lost in Space?</h2>
        <p class="text__description">
          The page you're looking for doesn't exist or was moved.
        </p>
         
        <p class="countdown-note">
  Redirecting to home in <span id="count">5</span> seconds...
</p>

        <a href="/" class="button">
          <i class="fas fa-arrow-left"></i>
          Back to Home
        </a>
      </div>
    </section>
  </main>

  <footer class="container footer">
    <hr />
    <p><strong><a href="https://github.com/calrexon">Made by Reincal</a></strong></p>
  </footer>

  <script>
    let countdown = 5;
  const btn = document.querySelector('.button');
  const countText = document.getElementById('count');

  const interval = setInterval(() => {
    countdown--;
    countText.textContent = countdown;
    btn.innerHTML = `<i class="fas fa-arrow-left"></i> Back to Home (${countdown})`;

    if (countdown <= 0) {
      clearInterval(interval);
      window.location.href = "/";
    }
  }, 1000);

  </script>

</body>
</html>
